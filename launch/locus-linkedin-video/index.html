<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js" integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2" crossorigin="anonymous"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #000;
      }
      #root {
        position: relative;
        width: 1080px;
        height: 1080px;
        overflow: hidden;
        background: #0A0D0F;
      }
      .scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="45"
      data-width="1080"
      data-height="1080"
    >
      <div
        id="el-01-founder-note"
        class="scene"
        data-composition-id="01-founder-note"
        data-composition-src="compositions/frames/01-founder-note.html"
        data-start="0"
        data-duration="4.5"
        data-track-index="0"
      ></div>

      <div
        id="el-02-task-evidence"
        class="scene"
        data-composition-id="02-task-evidence"
        data-composition-src="compositions/frames/02-task-evidence.html"
        data-start="4"
        data-duration="9.5"
        data-track-index="1"
      ></div>

      <div
        id="el-02-real-workflow"
        class="scene"
        data-composition-id="02-real-workflow"
        data-composition-src="compositions/frames/02-real-workflow.html"
        data-start="13"
        data-duration="15"
        data-track-index="0"
      ></div>

      <div
        id="el-03-real-result"
        class="scene"
        data-composition-id="03-real-result"
        data-composition-src="compositions/frames/03-real-result.html"
        data-start="28"
        data-duration="10.5"
        data-track-index="1"
      ></div>

      <div
        id="el-04-human-cta"
        class="scene"
        data-composition-id="04-human-cta"
        data-composition-src="compositions/frames/04-human-cta.html"
        data-start="38"
        data-duration="7"
        data-track-index="0"
      ></div>

    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
      // ── frame transitions (injected by transitions.mjs) ──
      (function () { var tl = window.__timelines["main"];
        tl.to("#el-01-founder-note", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.fromTo("#el-02-task-evidence", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 4);
        tl.to("#el-02-task-evidence", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 13);
        tl.fromTo("#el-02-real-workflow", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 13);
        tl.to("#el-03-real-result", { opacity: 0, duration: 0.5, ease: "power2.inOut" }, 38);
        tl.fromTo("#el-04-human-cta", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.inOut" }, 38);
        tl.to({}, { duration: 45 }, 0); // full-span anchor — main.duration() == composition total (Studio master duration)
      })();
    </script>
  </body>
</html>
