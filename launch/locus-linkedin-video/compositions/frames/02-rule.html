  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};

    const typedLine = document.getElementById("f02-rule-typed-line");
    const tickerInner = document.getElementById("f02-rule-ticker-inner");
    const painMotion = document.getElementById("f02-rule-pain-motion");
    const brandMotion = document.getElementById("f02-rule-brand-motion");
    const brandLockup = document.getElementById("f02-rule-brand-lockup");
    const blurNode = document.getElementById("f02-rule-streak-blur");

    const tl = gsap.timeline({ paused: true });

    const phrase = "Context overflows.";
    const typeDriver = { value: 0 };
    tl.to(
      typeDriver,
      {
        value: phrase.length,
        duration: 1.45,
        ease: "power1.inOut",
        onUpdate: () => {
          typedLine.textContent = phrase.substring(0, Math.floor(typeDriver.value));
        },
      },
      0,
    );

    const tickerSprings = [{ progress: 0 }];
    const applyTicker = () => {
      const total = tickerSprings.reduce((sum, spring) => sum + spring.progress, 0);
      tickerInner.style.transform = `translateY(${-112 * total}px)`;
    };
    applyTicker();

    tl.to(
      tickerSprings[0],
      {
        progress: 1,
        duration: 0.56,
        ease: "back.out(1.45)",
        onUpdate: applyTicker,
      },
      1.8,
    );

    const impact = { progress: 0 };
    const impactBlur = 24;
    const intruderStartX = 1080;
    const victimEndX = -1080;
    const victimFraction = 0.47;

    const applyImpact = () => {
      const p = impact.progress;
      const intruderX = intruderStartX * (1 - p);
      const intruderRotation = -8 * (1 - p);
      const intruderOpacity = Math.min(1, p * 6);
      const victimProgress = Math.min(1, p / victimFraction);
      const victimX = victimEndX * victimProgress;
      const victimOpacity = 1 - victimProgress;
      const blur = impactBlur * Math.pow(1 - p, 2.4);

      brandMotion.style.transform = `translateX(${intruderX}px) rotate(${intruderRotation}deg)`;
      brandMotion.style.opacity = String(intruderOpacity);
      painMotion.style.transform = `translateX(${victimX}px) rotate(${-7 * victimProgress}deg)`;
      painMotion.style.opacity = String(victimOpacity);
      blurNode.setAttribute("stdDeviation", `${blur} 0`);
    };
    applyImpact();

    tl.to(
      impact,
      {
        progress: 1,
        duration: 1.15,
        ease: "power2.out",
        onUpdate: applyImpact,
      },
      3.4,
    );

    brandLockup.style.transform = "scale(1) rotate(0deg)";
    const settle = { phase: 0 };
    tl.to(
      settle,
      {
        phase: Math.PI * 3,
        duration: 0.65,
        ease: "none",
        onUpdate: () => {
          const progress = settle.phase / (Math.PI * 3);
          const envelope = 1 - progress;
          const scale =
            1 +
            Math.sin(settle.phase) * 0.006 * envelope +
            Math.sin(settle.phase * 2.7) * 0.002 * envelope;
          const rotation = Math.sin(settle.phase * 1.7) * 0.42 * envelope;
          brandLockup.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
        },
      },
      4.55,
    );

    tl.fromTo(
      "#f02-rule-focused",
      { opacity: 0, y: 24, scale: 0.985 },
      { opacity: 1, y: 0, scale: 1, duration: 0.52, ease: "power3.out" },
      5.2,
    );

    tl.fromTo(
      "#f02-rule-whole",
      { opacity: 0, y: 24, scale: 0.985 },
      { opacity: 1, y: 0, scale: 1, duration: 0.52, ease: "power3.out" },
      5.78,
    );

    window.__timelines["02-rule"] = tl;
  </script>
